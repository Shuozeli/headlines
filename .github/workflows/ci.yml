name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cyuan
          POSTGRES_PASSWORD: cyuan
          POSTGRES_DB: headlines
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyuan -d headlines"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://cyuan:cyuan@localhost:5432/headlines
      PGPASSWORD: cyuan
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc and psql client
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler postgresql-client
      - name: Apply migrations to fresh Postgres
        run: |
          # Tests insert into the schema directly via raw SQL; the fresh
          # service-container Postgres has no schema until we apply the
          # migration. We use psql rather than diesel_cli to avoid the
          # ~2-min `cargo install diesel_cli` step.
          psql -h localhost -U cyuan -d headlines \
               -f migrations/00000000000000_initial/up.sql
          # Some DB-gated tests in headlines-auth call
          # `headlines_store::run_pending_migrations`, which expects
          # diesel's bookkeeping table to exist and the migration to be
          # marked as already applied. Create the tracking table and the
          # row so the call is a no-op (idempotent).
          psql -h localhost -U cyuan -d headlines -c "
            CREATE TABLE IF NOT EXISTS __diesel_schema_migrations (
              version VARCHAR(50) PRIMARY KEY NOT NULL,
              run_on TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
            );
            INSERT INTO __diesel_schema_migrations (version)
              VALUES ('00000000000000')
              ON CONFLICT DO NOTHING;
          "
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets

  buf-lint:
    name: buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint protos
        run: buf lint

  buf-breaking:
    name: buf breaking
    runs-on: ubuntu-latest
    # Allow failure on first push to main (no baseline yet); CI signal is
    # informational until the proto baseline lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check breaking changes against main
        run: buf breaking --against '.git#branch=main'

  schema-drift:
    name: schema drift (diesel print-schema vs committed schema.rs)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cyuan
          POSTGRES_PASSWORD: cyuan
          POSTGRES_DB: headlines
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyuan -d headlines"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://cyuan:cyuan@localhost:5432/headlines
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install diesel_cli (postgres only)
        run: cargo install diesel_cli --no-default-features --features postgres --version ^2.2
      - name: Apply migrations against fresh DB
        run: diesel migration run
      - name: Regenerate schema.rs into a tmp file
        run: diesel print-schema > /tmp/schema.generated.rs
      - name: Diff committed schema.rs against print-schema output
        run: |
          diff -u crates/headlines-store/src/schema.rs /tmp/schema.generated.rs \
            || (echo "::error::schema drift detected — run 'diesel print-schema > crates/headlines-store/src/schema.rs' and commit the result" && exit 1)
      - name: Compare pg_dump against committed db/schema.sql (informational)
        # pg_dump output is verbose and version-sensitive; we run a relaxed
        # check (table count + table names) rather than byte equality. Drift
        # in this check is informational; the diesel print-schema check above
        # is the mandatory one.
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=cyuan pg_dump --schema-only --no-owner --no-privileges \
            -h localhost -U cyuan -d headlines > /tmp/pg_dump.sql
          # Extract table identifiers from both sources and diff. Sorted unique sets.
          grep -oE "CREATE TABLE[A-Z ]* (public\.)?[a-z_][a-z_0-9]*" /tmp/pg_dump.sql \
            | sed -E 's/^CREATE TABLE[A-Z ]* (public\.)?//; s/[^a-z_0-9].*$//' \
            | sort -u > /tmp/tables_dump.txt
          grep -oE "CREATE TABLE[A-Z ]* (public\.)?[a-z_][a-z_0-9]*" db/schema.sql \
            | sed -E 's/^CREATE TABLE[A-Z ]* (public\.)?//; s/[^a-z_0-9].*$//' \
            | sort -u > /tmp/tables_committed.txt
          diff -u /tmp/tables_committed.txt /tmp/tables_dump.txt \
            && echo "table sets match between db/schema.sql and pg_dump output" \
            || echo "::warning::table-name set differs between db/schema.sql and pg_dump output"

  openapi-drift:
    name: openapi drift (buf generate vs committed swagger.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Regenerate OpenAPI spec
        run: buf generate
      - name: Diff committed OpenAPI against `buf generate` output
        run: |
          git diff --exit-code gen/openapi/ \
            || (echo "::error::OpenAPI drift detected — run 'buf generate' and commit gen/openapi/" && exit 1)

  cargo-audit:
    name: cargo audit (advisory scan)
    runs-on: ubuntu-latest
    # Strict: any advisory not explicitly ignored in .cargo/audit.toml
    # fails the run. Each ignore entry must carry a justification comment
    # and an expiry date.
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # cargo-audit picks up .cargo/audit.toml automatically.
        run: cargo audit
