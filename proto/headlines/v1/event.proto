syntax = "proto3";

package headlines.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

import "headlines/v1/options.proto";

// EventType — the v1 vocabulary for user-activity events.
//
// `data-model.md` stores the discriminator as `text` so the wire enum and the
// DB column move in lockstep; the SCREAMING_SNAKE name (e.g. `IMPRESSION`)
// without the `EVENT_TYPE_` prefix is used as the DB string.
enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_IMPRESSION = 1;
  EVENT_TYPE_OPEN = 2;
  EVENT_TYPE_DWELL = 3;
  EVENT_TYPE_LIKE = 4;
  EVENT_TYPE_UNLIKE = 5;
  EVENT_TYPE_SHARE = 6;
}

// ---------------------------------------------------------------------------
// Per-type properties
// ---------------------------------------------------------------------------

// IMPRESSION — article shown in a feed.
message ImpressionProperties {
  string feed_kind = 1;
  int32 position = 2;
}

// OPEN — user opened the article detail view.
message OpenProperties {
  string feed_kind = 1;
  int32 position = 2;
}

// DWELL — time spent reading. Caller may emit multiple per session.
message DwellProperties {
  int64 dwell_ms = 1;
}

// LIKE — user liked an article. No payload.
message LikeProperties {}

// UNLIKE — user reverted a like. No payload.
message UnlikeProperties {}

// SHARE — user shared (e.g. `twitter`, `copy_link`).
message ShareProperties {
  string target = 1;
}

// ---------------------------------------------------------------------------
// Event
// ---------------------------------------------------------------------------

// Event — a single recorded activity row. `properties` oneof selector must
// match `type`; the service rejects mismatches with `EVENT_TYPE_MISMATCH`.
message Event {
  string id = 1;                                 // UUIDv7, server-assigned
  string user_id = 2;                            // soft ref
  string article_id = 3;                         // soft ref
  EventType type = 4;
  google.protobuf.Timestamp occurred_at = 5;     // client-supplied
  google.protobuf.Timestamp received_at = 6;     // server-assigned (TSO)
  string surface = 7;                            // 'web', 'mobile', ...
  oneof properties {
    ImpressionProperties impression = 100;
    OpenProperties open = 101;
    DwellProperties dwell = 102;
    LikeProperties like = 103;
    UnlikeProperties unlike = 104;
    ShareProperties share = 105;
  }
}

// ---------------------------------------------------------------------------
// EventService
// ---------------------------------------------------------------------------

// EventService — see `docs/design/events.md` for the canonical spec
// (validation rules, error reasons, behavior, batch atomicity, occurred_at
// window). Authorization is encoded directly on each RPC via the
// `auth_requirement` MethodOption and consumed by the proto-driven
// `AUTH_TABLE` (see `docs/design/architecture.md` "Proto-driven authorization").
//
// The user-self path lets a web/mobile client (already signing as the user)
// post their own events. The system path is for trusted aggregators /
// backfills. `ListEvents` is system-only — it's an analytics surface, not a
// user-facing read.
service EventService {
  // RecordEvent appends a single event row. Server assigns `id` (UUIDv7) and
  // `received_at` (TSO); any client-supplied values for those fields are
  // silently ignored.
  //
  // Authorization: User whose `id == request.user_id` OR System with
  // `events.write`.
  rpc RecordEvent(RecordEventRequest) returns (Event) {
    option (google.api.http) = {
      post: "/v1/events"
      body: "*"
    };
    option (headlines.v1.auth_requirement) = {
      allowed_subjects: [SUBJECT_CLASS_USER_SELF, SUBJECT_CLASS_SYSTEM]
      required_scopes: ["events.write"]
    };
  }

  // RecordEventBatch — all-or-none batch insert. Validation runs over the
  // whole batch first; on any failure the entire batch is rejected with the
  // first failing reason. On success the batch is inserted in a single tx.
  // Cap is `events.batch_max_items` (default 500).
  //
  // Authorization: same rule as `RecordEvent`, applied to **every** event in
  // the batch.
  rpc RecordEventBatch(RecordEventBatchRequest) returns (RecordEventBatchResponse) {
    option (google.api.http) = {
      post: "/v1/events:batch"
      body: "*"
    };
    option (headlines.v1.auth_requirement) = {
      allowed_subjects: [SUBJECT_CLASS_USER_SELF, SUBJECT_CLASS_SYSTEM]
      required_scopes: ["events.write"]
    };
  }

  // ListEvents — analytics-only. Filters AND-combined; cursor encodes
  // `(received_at, id)` for stable forward iteration; results in ASC order
  // so the ranker can drain incrementally.
  //
  // Authorization: System with `events.read` only.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse) {
    option (google.api.http) = {
      get: "/v1/events"
    };
    option (headlines.v1.auth_requirement) = {
      allowed_subjects: [SUBJECT_CLASS_SYSTEM]
      required_scopes: ["events.read"]
    };
  }
}

message RecordEventRequest {
  string user_id = 1;
  string article_id = 2;
  EventType type = 3;
  google.protobuf.Timestamp occurred_at = 4;
  string surface = 5;
  oneof properties {
    ImpressionProperties impression = 100;
    OpenProperties open = 101;
    DwellProperties dwell = 102;
    LikeProperties like = 103;
    UnlikeProperties unlike = 104;
    ShareProperties share = 105;
  }
}

message RecordEventBatchRequest {
  repeated RecordEventRequest events = 1;
}

message RecordEventBatchResponse {
  // Same order as the request, populated with id + received_at.
  repeated Event recorded = 1;
  int32 stored_count = 2;
}

message ListEventsRequest {
  int32 page_size = 1;
  // Opaque base64 cursor on `(received_at, id)` ASC.
  string page_token = 2;
  string user_id = 3;
  string article_id = 4;
  repeated EventType types = 5;
  google.protobuf.Timestamp received_after = 6;
  google.protobuf.Timestamp received_before = 7;
}

message ListEventsResponse {
  repeated Event items = 1;
  string next_page_token = 2;
}
