repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: rustfmt-check
        name: rustfmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]

      - id: clippy-check
        name: clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: buf-lint
        name: buf lint
        entry: buf lint
        language: system
        pass_filenames: false
        files: '\.proto$|^buf\.ya?ml$|^buf\.gen\.ya?ml$'
